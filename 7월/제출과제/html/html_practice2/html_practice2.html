<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 등록</title>
</head>

<body>
    
    카테고리 :  <select>
                    <option> 공지사항 </option>
                    <option> Q&A </option>
                    <option> 기타 </option>
                </select>

        <br>
        <input type="text" placeholder="작성자" /> <input type="password" placeholder="비밀번호" />
        <hr />
        <input type="text" placeholder="게시물 제목 입력" />
        <hr />
        <textarea cols="50" rows="10" placeholder="게시물 내용 입력"></textarea>
        <br>

        공개선택 <input type="radio" name="동의여부" /> 예
        <input type="radio" name="동의여부" /> 아니요 <br/>

        공유선택<input type="checkbox" /> 카카오톡
            <input type="checkbox" /> 트위터 
            <input type="checkbox" /> 네이버카페<br/>

        작성일자 <input type="date" /> 작성시간 <input type="time">
        <hr />

        첨부파일 : <input type="file" /> <br><br>
        <button > 목록보기 </button>
        <button > 글쓰기  </button>
        <button > 다시쓰기 </button>

    
</body>
</html>
